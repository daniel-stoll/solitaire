              (metrics.draws >= 60 ? 3 : metrics.draws >= 48 ? 2 : metrics.draws >= 34 ? 1 : 0) +
              (metrics.nodes >= 1200 ? 3 : metrics.nodes >= 650 ? 2 : metrics.nodes >= 350 ? 1 : 0) +
              (metrics.maxBranch >= 10 ? 2 : metrics.maxBranch >= 8 ? 1 : 0);
            return { score, friction };
          }
          function classify(metrics) {
            const profile = difficultyProfile(metrics);
            metrics.difficultyScore = profile.score;
            metrics.friction = profile.friction;
            const strongTalon = metrics.resets >= 3 || metrics.draws >= 58;
            const strongSearch = metrics.nodes >= 1200 || metrics.depth >= 520;
            if (
              profile.score >= 360 &&
              profile.friction >= 7 &&
              (strongTalon || strongSearch || metrics.maxBranch >= 10)
            ) {
              return "Hard";
            }
            if (
              profile.score >= 460 &&
              profile.friction >= 6 &&
              strongSearch
            ) {
              return "Hard";
            }
            if (profile.score >= 155 && profile.friction >= 3) return "Medium";
            return "Easy";
          }
          function full() {
            return counts.easy >= maxBank && counts.medium >= maxBank && counts.hard >= maxBank;
          }
          function matchesMode(difficulty, mode) {
            if (!mode) return false;
            return difficulty.toLowerCase() === mode;
          }
          function tick() {
            const activeRequest = requestedMode;
            if (paused || (!activeRequest && full())) {
              setTimeout(tick, 1400);
              return;
            }
            const started = performance.now();
            let attempts = 0;
            const budgetMs = activeRequest ? 150 : 38;
            const maxAttempts = activeRequest ? 24 : 6;
            let foundDeal = false;
            while (performance.now() - started < budgetMs && attempts < maxAttempts) {
              attempts++;
              const seed = randomSeed();
              if (seen.has(seed)) continue;
              seen.add(seed);
              const result = solve(deal(seed), activeRequest ? REQUEST_SOLVE_BUDGET : BACKGROUND_SOLVE_BUDGET);
              if (!result.solved) continue;
              const difficulty = classify(result);
              const key = difficulty.toLowerCase();
              const requested = activeRequest && matchesMode(difficulty, activeRequest);
              foundDeal = true;
              if (requested) {
                requestedMode = null;
                backgroundMissStreak = 0;
                postMessage({ type: "deal", requested: true, deal: { seed, difficulty, metrics: result } });
                break;
              }
              if (counts[key] >= maxBank) continue;
              counts[key] += 1;
              backgroundMissStreak = 0;
              postMessage({ type: "deal", deal: { seed, difficulty, metrics: result } });
              if (!activeRequest) break;
            }
            if (!activeRequest && !foundDeal) backgroundMissStreak = Math.min(8, backgroundMissStreak + 1);
            const missBackoff = activeRequest ? 0 : backgroundMissStreak * 450;
            setTimeout(tick, requestedMode ? 100 : 900 + missBackoff + Math.floor(Math.random() * 900));
          }
          tick();
        `;
      }

      board.addEventListener("pointerdown", beginPointer);
      board.addEventListener("pointermove", movePointer);
      board.addEventListener("pointerup", endPointer);
      board.addEventListener("pointercancel", () => {
        if (pointer && pointer.els) {
          pointer.els.forEach((el) => {
            el.classList.remove("dragging");
            el.style.transform = "";
          });
        }
        pointer = null;
        pauseGenerator(false);
      });
      board.addEventListener("dblclick", (event) => {
        event.preventDefault();
      });
      board.addEventListener("contextmenu", (event) => {
        event.preventDefault();
        startTimer();
        const cardEl = event.target.closest(".card");
        const pileEl = event.target.closest("[data-pile]");
        if (pileEl && (pileEl.dataset.pile === "stock" || pileEl.dataset.pile === "waste")) {
          autoMove();
          return;
        }
        if (cardEl) smartMoveFromElement(cardEl);
        else autoMove();
      });
      boardWrap.addEventListener("contextmenu", (event) => {
        event.preventDefault();
      });
      dealModeButtons.forEach((button) => {
        button.addEventListener("click", () => setDealMode(button.dataset.dealMode));
      });
      layoutModeButtons.forEach((button) => {
        button.addEventListener("click", () => setLayout(button.dataset.layoutMode));
      });
      winDealModeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const mode = button.dataset.winDealMode;
          setDealMode(mode);
          winModal.classList.remove("open");
          newGame(mode);
        });
      });
      newGameBtn.addEventListener("click", () => newGame());
      newWinGame.addEventListener("click", () => newGame(currentGameDealMode()));
      restartBtn.addEventListener("click", restartGame);
      undoBtn.addEventListener("click", undo);
      hintBtn.addEventListener("click", showHint);
      bottomAutoMoveBtn.addEventListener("click", () => {
        startTimer();
        autoMove();
      });
      bankLimitInput.addEventListener("change", () => setBankLimit(bankLimitInput.value));
      settingsToggle.addEventListener("click", openSettings);
      themeModeButtons.forEach((button) => {
        button.addEventListener("click", () => setTheme(button.dataset.themeMode));
      });
      performanceControlsToggle.addEventListener("click", () => {
        setPerformanceControls(!performanceControlsEnabled);
      });
      closeSettings.addEventListener("click", closeSettingsModal);
      settingsModal.addEventListener("click", (event) => {
        if (event.target === settingsModal) closeSettingsModal();
      });
      closeWin.addEventListener("click", () => winModal.classList.remove("open"));
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && settingsModal.classList.contains("open")) {
          closeSettingsModal();
        }
      });
      document.addEventListener("visibilitychange", () => pauseGenerator(document.hidden));
      window.addEventListener("resize", () => render());
      setInterval(() => {
        if (game && !game.won) timeEl.textContent = formatTime(elapsedSeconds());
      }, 1000);

      syncBankLimitInput();
      syncTheme();
      syncLayout();
      renderBank();
      startInitialGame();
      startGenerator();
      sleep(0).then(syncGenerator);
    })();
  </script>
</body>
</html>
